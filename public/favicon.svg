<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-reduced-motion: no-preference) {
      #head {
        animation: head-bob 2.8s ease-in-out infinite;
        transform-origin: 32px 34px;
      }

      .eye {
        animation: blink 3.2s ease-in-out infinite;
        transform-origin: center;
      }

      #spark {
        animation: spark-pulse 1.8s ease-in-out infinite;
        transform-origin: 49px 17px;
      }
    }

    @keyframes head-bob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-2px) rotate(-2deg); }
    }

    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      94% { transform: scaleY(0.14); }
    }

    @keyframes spark-pulse {
      0%, 100% { opacity: 0.72; transform: scale(0.92); }
      50% { opacity: 1; transform: scale(1.08); }
    }
  </style>
